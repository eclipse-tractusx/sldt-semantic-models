name: Bulk Validation
on:
  workflow_dispatch:
    
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-java@3a4f6111f18e3a0147563e7784f39100145c11a0 # v4.5.0
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Install Node dependencies
        working-directory: ./.github/actions/model-validation
        run: npm install
      - name: validate models
        uses: ./.github/actions/model-validation
        with:
          samm_version: 2.11.1
          bulk: true
      - name: Archive
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: full-validation-report
          path: output
